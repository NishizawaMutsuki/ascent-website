<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 980" width="900" height="980" font-family="'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="980" rx="12" fill="#f8fafb"/>

  <!-- タイトル -->
  <text x="450" y="45" text-anchor="middle" font-size="20" font-weight="700" fill="#1a3a4a">診療科別 おすすめ予約システムマップ</text>
  <text x="450" y="70" text-anchor="middle" font-size="12" fill="#6b8a9e">自院の診療科から最適なシステムを見つけましょう</text>

  <!-- ===== カード1: 小児科 ===== -->
  <g transform="translate(30, 95)">
    <rect width="840" height="120" rx="10" fill="#ffffff" stroke="#4db6ac" stroke-width="2" filter="url(#shadow)"/>
    <rect width="160" height="120" rx="10" fill="#e0f2f1"/>
    <rect x="160" y="0" width="10" height="120" fill="#e0f2f1"/>
    <text x="80" y="55" text-anchor="middle" font-size="15" font-weight="700" fill="#00796b">小児科</text>
    <text x="80" y="78" text-anchor="middle" font-size="11" fill="#00897b">Pediatrics</text>
    <text x="195" y="35" font-size="14" font-weight="700" fill="#1a3a4a">おすすめシステム</text>
    <text x="195" y="60" font-size="13" fill="#2e7d6e">● ドクターキューブ</text>
    <text x="380" y="60" font-size="13" fill="#2e7d6e">● メディカル革命</text>
    <text x="545" y="60" font-size="13" fill="#2e7d6e">● 3Bees</text>
    <text x="195" y="90" font-size="12" fill="#5f7a8a">順番予約が強く、予防接種の予約管理が充実</text>
  </g>

  <!-- ===== カード2: 耳鼻咽喉科・皮膚科・眼科 ===== -->
  <g transform="translate(30, 240)">
    <rect width="840" height="120" rx="10" fill="#ffffff" stroke="#7986cb" stroke-width="2" filter="url(#shadow)"/>
    <rect width="160" height="120" rx="10" fill="#e8eaf6"/>
    <rect x="160" y="0" width="10" height="120" fill="#e8eaf6"/>
    <text x="80" y="40" text-anchor="middle" font-size="14" font-weight="700" fill="#303f9f">耳鼻咽喉科</text>
    <text x="80" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#303f9f">皮膚科・眼科</text>
    <text x="80" y="85" text-anchor="middle" font-size="10" fill="#3f51b5">ENT / Derma / Oph</text>
    <text x="195" y="35" font-size="14" font-weight="700" fill="#1a3a4a">おすすめシステム</text>
    <text x="195" y="60" font-size="13" fill="#3949ab">● アイチケット</text>
    <text x="370" y="60" font-size="13" fill="#3949ab">● ドクターキューブ</text>
    <text x="565" y="60" font-size="13" fill="#3949ab">● 3Bees</text>
    <text x="195" y="90" font-size="12" fill="#5f7a8a">順番予約メインで、待ち時間の見える化に強い</text>
  </g>

  <!-- ===== カード3: 内科（一般） ===== -->
  <g transform="translate(30, 385)">
    <rect width="840" height="120" rx="10" fill="#ffffff" stroke="#81c784" stroke-width="2" filter="url(#shadow)"/>
    <rect width="160" height="120" rx="10" fill="#e8f5e9"/>
    <rect x="160" y="0" width="10" height="120" fill="#e8f5e9"/>
    <text x="80" y="52" text-anchor="middle" font-size="15" font-weight="700" fill="#2e7d32">内科（一般）</text>
    <text x="80" y="77" text-anchor="middle" font-size="11" fill="#388e3c">Internal Medicine</text>
    <text x="195" y="35" font-size="14" font-weight="700" fill="#1a3a4a">おすすめシステム</text>
    <text x="195" y="60" font-size="13" fill="#388e3c">● ドクターキューブ</text>
    <text x="395" y="60" font-size="13" fill="#388e3c">● 3Bees</text>
    <text x="510" y="60" font-size="13" fill="#388e3c">● メディカル革命</text>
    <text x="195" y="90" font-size="12" fill="#5f7a8a">順番予約と時間予約の併用がしやすい</text>
  </g>

  <!-- ===== カード4: 心療内科・精神科 ===== -->
  <g transform="translate(30, 530)">
    <rect width="840" height="120" rx="10" fill="#ffffff" stroke="#ba68c8" stroke-width="2" filter="url(#shadow)"/>
    <rect width="160" height="120" rx="10" fill="#f3e5f5"/>
    <rect x="160" y="0" width="10" height="120" fill="#f3e5f5"/>
    <text x="80" y="42" text-anchor="middle" font-size="14" font-weight="700" fill="#7b1fa2">心療内科</text>
    <text x="80" y="64" text-anchor="middle" font-size="14" font-weight="700" fill="#7b1fa2">精神科</text>
    <text x="80" y="87" text-anchor="middle" font-size="10" fill="#8e24aa">Psychiatry</text>
    <text x="195" y="35" font-size="14" font-weight="700" fill="#1a3a4a">おすすめシステム</text>
    <text x="195" y="60" font-size="13" fill="#7b1fa2">● CLINICS</text>
    <text x="195" y="90" font-size="12" fill="#5f7a8a">時間予約＋オンライン診療との相性が良い</text>
  </g>

  <!-- ===== カード5: 産婦人科 ===== -->
  <g transform="translate(30, 675)">
    <rect width="840" height="120" rx="10" fill="#ffffff" stroke="#f48fb1" stroke-width="2" filter="url(#shadow)"/>
    <rect width="160" height="120" rx="10" fill="#fce4ec"/>
    <rect x="160" y="0" width="10" height="120" fill="#fce4ec"/>
    <text x="80" y="55" text-anchor="middle" font-size="15" font-weight="700" fill="#c2185b">産婦人科</text>
    <text x="80" y="78" text-anchor="middle" font-size="11" fill="#d81b60">OB/GYN</text>
    <text x="195" y="35" font-size="14" font-weight="700" fill="#1a3a4a">おすすめシステム</text>
    <text x="195" y="60" font-size="13" fill="#c2185b">● メディカル革命</text>
    <text x="195" y="90" font-size="12" fill="#5f7a8a">複雑な予約パターン（健診＋通常診療）に対応</text>
  </g>

  <!-- ===== カード6: 新規開業（カルテ未定） ===== -->
  <g transform="translate(30, 820)">
    <rect width="840" height="120" rx="10" fill="#ffffff" stroke="#ffb74d" stroke-width="2" filter="url(#shadow)"/>
    <rect width="160" height="120" rx="10" fill="#fff3e0"/>
    <rect x="160" y="0" width="10" height="120" fill="#fff3e0"/>
    <text x="80" y="42" text-anchor="middle" font-size="14" font-weight="700" fill="#e65100">新規開業</text>
    <text x="80" y="64" text-anchor="middle" font-size="13" font-weight="600" fill="#ef6c00">（カルテ未定）</text>
    <text x="80" y="87" text-anchor="middle" font-size="10" fill="#f57c00">New Opening</text>
    <text x="195" y="35" font-size="14" font-weight="700" fill="#1a3a4a">おすすめシステム</text>
    <text x="195" y="60" font-size="13" fill="#e65100">● デジスマ診療</text>
    <text x="380" y="60" font-size="13" fill="#e65100">● CLINICS</text>
    <text x="195" y="90" font-size="12" fill="#5f7a8a">カルテ・予約・問診をまとめて導入できる</text>
  </g>

  <!-- フッター -->
  <text x="450" y="968" text-anchor="middle" font-size="10" fill="#9eb3c2">※ 各システムの機能・料金は変更される場合があります。導入前に最新情報をご確認ください。</text>
</svg>