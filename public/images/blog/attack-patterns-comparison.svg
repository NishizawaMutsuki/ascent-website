<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="420" rx="12" fill="#f9fafb"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">攻撃の2つのパターン</text>

  <!-- Pattern A -->
  <g transform="translate(24, 60)">
    <rect width="320" height="330" rx="12" fill="white" filter="url(#shadow)"/>

    <!-- Header -->
    <rect width="320" height="52" rx="12" fill="#f59e0b"/>
    <rect y="40" width="320" height="12" fill="#f59e0b"/>
    <text x="160" y="33" text-anchor="middle" font-size="15" font-weight="700" fill="white">パターンA：HP改ざん</text>

    <!-- Content -->
    <text x="160" y="80" text-anchor="middle" font-size="12" fill="#92400e" font-weight="600">事例1に該当</text>

    <!-- Flow -->
    <rect x="40" y="100" width="240" height="36" rx="8" fill="#fef3c7"/>
    <text x="160" y="123" text-anchor="middle" font-size="12" fill="#92400e">CMS（WordPress等）の脆弱性</text>

    <text x="160" y="150" text-anchor="middle" font-size="16" fill="#d97706">↓</text>

    <rect x="40" y="160" width="240" height="36" rx="8" fill="#fef3c7"/>
    <text x="160" y="183" text-anchor="middle" font-size="12" fill="#92400e">HPのページ内容を書き換え</text>

    <text x="160" y="210" text-anchor="middle" font-size="16" fill="#d97706">↓</text>

    <rect x="40" y="220" width="240" height="36" rx="8" fill="#fef3c7"/>
    <text x="160" y="243" text-anchor="middle" font-size="12" fill="#92400e">患者の端末にマルウェア配布</text>

    <!-- Stats -->
    <line x1="40" y1="272" x2="280" y2="272" stroke="#e5e7eb"/>
    <text x="160" y="296" text-anchor="middle" font-size="11" fill="#6b7280">WordPress脆弱性: 年間約8,000件</text>
    <text x="160" y="314" text-anchor="middle" font-size="11" fill="#6b7280">96%はプラグインが原因</text>
  </g>

  <!-- Pattern B -->
  <g transform="translate(376, 60)">
    <rect width="320" height="330" rx="12" fill="white" filter="url(#shadow)"/>

    <!-- Header -->
    <rect width="320" height="52" rx="12" fill="#dc2626"/>
    <rect y="40" width="320" height="12" fill="#dc2626"/>
    <text x="160" y="33" text-anchor="middle" font-size="15" font-weight="700" fill="white">パターンB：システム侵入</text>

    <!-- Content -->
    <text x="160" y="80" text-anchor="middle" font-size="12" fill="#991b1b" font-weight="600">事例2〜4に該当</text>

    <!-- Flow -->
    <rect x="40" y="100" width="240" height="36" rx="8" fill="#fef2f2"/>
    <text x="160" y="123" text-anchor="middle" font-size="12" fill="#991b1b">VPN機器・RDPの脆弱性</text>

    <text x="160" y="150" text-anchor="middle" font-size="16" fill="#dc2626">↓</text>

    <rect x="40" y="160" width="240" height="36" rx="8" fill="#fef2f2"/>
    <text x="160" y="183" text-anchor="middle" font-size="12" fill="#991b1b">院内ネットワーク全体に侵入</text>

    <text x="160" y="210" text-anchor="middle" font-size="16" fill="#dc2626">↓</text>

    <rect x="40" y="220" width="240" height="36" rx="8" fill="#fef2f2"/>
    <text x="160" y="243" text-anchor="middle" font-size="12" fill="#991b1b">電子カルテ暗号化・患者情報流出</text>

    <!-- Stats -->
    <line x1="40" y1="272" x2="280" y2="272" stroke="#e5e7eb"/>
    <text x="160" y="296" text-anchor="middle" font-size="11" fill="#6b7280">侵入経路の約80%がVPN/RDP</text>
    <text x="160" y="314" text-anchor="middle" font-size="11" fill="#6b7280">復旧: 数週間〜数か月 / 被害: 数億円〜</text>
  </g>

  <!-- Footer -->
  <text x="360" y="410" text-anchor="middle" font-size="10" fill="#9ca3af">出典：警察庁「サイバー空間をめぐる脅威の情勢等について」を基に作成</text>
</svg>
